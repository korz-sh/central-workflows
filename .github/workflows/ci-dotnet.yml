name: CI .NET (Reusable)

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        type: string
        default: '10.0.x'
      service-name:
        required: true
        type: string
        description: 'Service name for korz-status reporting (e.g. rbac-api)'
      coverage-json-path:
        required: false
        type: string
        default: 'coverage/coverage.json'
        description: 'Path to reportgenerator Json output'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - run: dotnet restore
      # KOR-53 Q7: --no-restore — the previous step already restored; without it
      # `dotnet build` restores a second time. (The `validate` job itself duplicates
      # `test`'s compile and should be dropped, but that's deferred to KOR-54 because
      # a service may pin it as a required status check in branch protection.)
      - run: dotnet build --no-restore

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - run: dotnet restore
      # --no-restore: reuse the restore above instead of restoring implicitly again.
      - run: dotnet test --no-restore --collect:"XPlat Code Coverage" --logger "trx" --results-directory TestResults
      - run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"TestResults/*/coverage.cobertura.xml" -targetdir:"coverage" -reporttypes:"Cobertura;JsonSummary;Html"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-dotnet-${{ inputs.service-name }}
          path: |
            TestResults/
            coverage/
          retention-days: 1

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-dotnet-${{ inputs.service-name }}

      - name: Extract coverage percentage
        id: coverage
        run: |
          if [ -f "${{ inputs.coverage-json-path }}" ]; then
            COVERAGE=$(jq '.total.lines.pct' "${{ inputs.coverage-json-path }}")
          else
            COVERAGE="0"
          fi
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Publish coverage to korz-status
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        continue-on-error: true
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/korz-sh/korz-status.git korz-status --depth=1
          cd korz-status

          SERVICE="${{ inputs.service-name }}"
          COVERAGE="${{ steps.coverage.outputs.percentage }}"

          mkdir -p reports .badges

          cat > reports/${SERVICE}-coverage.json <<EOF
          {
            "service": "${SERVICE}",
            "coverage": ${COVERAGE},
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "source_run_id": "${{ github.run_id }}"
          }
          EOF

          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR="4c1"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then COLOR="dfb317"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR="fe7d37"
          else COLOR="e05d44"; fi

          cat > .badges/${SERVICE}-coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="150" height="20">
            <rect width="100" height="20" fill="#555"/>
            <rect x="100" width="50" height="20" fill="#${COLOR}"/>
            <text x="50" y="14" fill="#fff" text-anchor="middle" font-family="Verdana" font-size="11">${SERVICE}</text>
            <text x="125" y="14" fill="#fff" text-anchor="middle" font-family="Verdana" font-size="11">${COVERAGE}%</text>
          </svg>
          EOF

          git config user.name "Korz Bot"
          git config user.email "bot@korz.sh"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/korz-sh/korz-status.git
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: update coverage for ${SERVICE} - ${COVERAGE}%"
            git push
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
