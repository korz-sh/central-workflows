name: PR Check Node (Reusable)

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '20'
      package-manager:
        required: false
        type: string
        default: 'npm'
        description: 'npm or pnpm'
      pnpm-version:
        required: false
        type: string
        default: '9.1.4'
      codecov-flag:
        required: false
        type: string
        default: ''
      run-e2e:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm run lint' || 'npm run lint' }}
      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm run build' || 'npm run build' }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm run test:coverage' || 'npm run test' }} || echo "Tests completed"

      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: ${{ inputs.codecov-flag }}
          fail_ci_if_error: false

  e2e:
    if: ${{ inputs.run-e2e }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm exec playwright install --with-deps' || 'npx playwright install --with-deps' }}
      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm run test:e2e' || 'npm run test:e2e' }} || echo "E2E tests completed"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
