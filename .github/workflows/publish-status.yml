name: Publish Coverage Status

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name (e.g., entitlement-api, rbac-api)'
      coverage-percentage:
        required: true
        type: string
        description: 'Coverage percentage (e.g., 75.5)'
      run-id:
        required: false
        type: string
        description: 'Source workflow run ID'
    secrets:
      GITHUB_TOKEN:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout korz-status repo
        uses: actions/checkout@v4
        with:
          repository: korz-sh/korz-status
          token: ${{ secrets.GITHUB_TOKEN }}
          path: korz-status

      - name: Create/Update service coverage report
        run: |
          mkdir -p korz-status/reports korz-status/.badges

          # Create service coverage file
          cat > korz-status/reports/${{ inputs.service-name }}-coverage.json <<EOF
          {
            "service": "${{ inputs.service-name }}",
            "coverage": ${{ inputs.coverage-percentage }},
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "source_run_id": "${{ inputs.run-id }}"
          }
          EOF

      - name: Generate badges
        run: |
          SERVICE="${{ inputs.service-name }}"
          COVERAGE="${{ inputs.coverage-percentage }}"

          # Determine color based on coverage
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="4c1"  # Green
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            COLOR="dfb317"  # Yellow
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="fe7d37"  # Orange
          else
            COLOR="e05d44"  # Red
          fi

          # Create badge SVG
          mkdir -p korz-status/.badges
          cat > korz-status/.badges/$SERVICE-coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="150" height="20" role="img" aria-label="$SERVICE: $COVERAGE%">
            <title>$SERVICE: $COVERAGE%</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb"/>
              <stop offset="1" stop-color="#999"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="150" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="100" height="20" fill="#555"/>
              <rect x="100" width="50" height="20" fill="$COLOR"/>
              <rect width="150" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
              <text aria-hidden="true" x="510" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="900">$SERVICE</text>
              <text x="510" y="140" transform="scale(.1)" fill="#fff" textLength="900">$SERVICE</text>
              <text aria-hidden="true" x="1240" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="400">$COVERAGE%</text>
              <text x="1240" y="140" transform="scale(.1)" fill="#fff" textLength="400">$COVERAGE%</text>
            </g>
          </svg>
          EOF

      - name: Update coverage table in README
        run: |
          cd korz-status
          SERVICE="${{ inputs.service-name }}"
          COVERAGE="${{ inputs.coverage-percentage }}"

          # Update or create service entry in README
          if grep -q "^| **$SERVICE**" README.md; then
            # Service exists, update it
            sed -i "s/^| **$SERVICE** .*/| **$SERVICE** | \`$COVERAGE%\` | ✅ | — |/" README.md
          else
            # Add new service entry (before closing table)
            sed -i "/^| **web-client**/a | **$SERVICE** | \`$COVERAGE%\` | ✅ | — |" README.md
          fi

      - name: Update STATUS.md
        run: |
          cd korz-status
          cat > STATUS.md <<'EOF'
          # Korz Status — Last Update

          **Last updated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Service**: ${{ inputs.service-name }}
          **Coverage**: ${{ inputs.coverage-percentage }}%
          **Source**: ${{ inputs.run-id }}

          ---

          ## Recent Updates

          Service reports are published automatically from each repository's CI/CD pipeline.

          View all coverage badges and reports: [→ coverage/](./coverage/index.html)
          EOF

      - name: Commit and push
        working-directory: korz-status
        run: |
          git config user.name "Korz Bot"
          git config user.email "bot@korz.sh"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update coverage for ${{ inputs.service-name }} - ${{ inputs.coverage-percentage }}%

            Service: ${{ inputs.service-name }}
            Coverage: ${{ inputs.coverage-percentage }}%
            Updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)
            Source: ${{ github.repository }}#${{ inputs.run-id }}"

            git push origin main
          fi

      - name: Summary
        run: |
          echo "## 📊 Coverage Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service**: ${{ inputs.service-name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage**: ${{ inputs.coverage-percentage }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Published to: [korz-status](https://github.com/korz-sh/korz-status)" >> $GITHUB_STEP_SUMMARY
